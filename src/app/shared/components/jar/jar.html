<svg viewBox="0 0 260 360" xmlns="http://www.w3.org/2000/svg" class="jar">

  <defs>

    <!-- Glass -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">

      <stop offset="0%" stop-color="#ffffff" stop-opacity=".42" />

      <stop offset="20%" stop-color="#ffffff" stop-opacity=".14" />

      <stop offset="50%" stop-color="#ffffff" stop-opacity=".04" />

      <stop offset="80%" stop-color="#ffffff" stop-opacity=".14" />

      <stop offset="100%" stop-color="#ffffff" stop-opacity=".36" />

    </linearGradient>

    <!-- Glass Stroke -->

    <linearGradient id="glassStroke">

      <stop offset="0%" stop-color="#d8d8d8" />

      <stop offset="50%" stop-color="#7f7f7f" />

      <stop offset="100%" stop-color="#eeeeee" />

    </linearGradient>

    <!-- Lid -->

    <linearGradient id="lid">

      <stop offset="0%" stop-color="#d7d7d7" />

      <stop offset="35%" stop-color="#bababa" />

      <stop offset="65%" stop-color="#9d9d9d" />

      <stop offset="100%" stop-color="#d8d8d8" />

    </linearGradient>

    <!-- Powder -->

    <linearGradient id="powder">

      <stop offset="0%" [attr.stop-color]="tone()" />

      <stop offset="100%" [attr.stop-color]="tone()" />

    </linearGradient>

    <!-- Reflection -->

    <linearGradient id="gloss">

      <stop offset="0%" stop-color="#fff" stop-opacity=".42" />

      <stop offset="25%" stop-color="#fff" stop-opacity=".10" />

      <stop offset="70%" stop-color="#fff" stop-opacity="0" />

      <stop offset="100%" stop-color="#fff" stop-opacity=".18" />

    </linearGradient>

    <!-- Powder Grain -->

    <filter id="grain">

      <feTurbulence type="fractalNoise" baseFrequency=".7" numOctaves="3" seed="4" result="noise" />

      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" />

    </filter>

    <!-- Shadow -->

    <filter id="shadow">

      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity=".18" />

    </filter>

    <!-- Bottle Clip -->

    <clipPath id="jarClip">

      <path d="
        M78 82

        C78 72 86 66 96 66

        H164

        C174 66 182 72 182 82

        V270

        C182 292 168 308 146 314

        H114

        C92 308 78 292 78 270

        Z" />

    </clipPath>

  </defs>

  <!-- Shadow -->
  <!-- Ground Shadow -->
  <ellipse cx="130" cy="326" rx="58" ry="10" fill="#000" opacity=".12" filter="url(#shadow)" />

  <!-- Powder (inside bottle only) -->
  <g clip-path="url(#jarClip)">

    <path filter="url(#grain)" [attr.fill]="'url(#powder)'" [attr.d]="powderPath()" />

    <!-- Surface Highlight -->
    <path fill="#fff" opacity=".16" [attr.d]="powderHighlight()" />

  </g>

  <!-- Bottle Glass -->
  <path d="
    M78 82

    C78 72 86 66 96 66

    H164

    C174 66 182 72 182 82

    V270

    C182 292 168 308 146 314

    H114

    C92 308 78 292 78 270

    Z" fill="url(#glass)" stroke="url(#glassStroke)" stroke-width="2" />

  <!-- Left Reflection -->
  <rect x="90" y="86" width="12" height="210" rx="6" fill="#fff" opacity=".22" />

  <!-- Right Reflection -->
  <rect x="165" y="96" width="7" height="180" rx="3" fill="#fff" opacity=".10" />

  <!-- Center Soft Reflection -->
  <rect x="118" y="100" width="24" height="180" fill="url(#gloss)" opacity=".22" />

  <!-- Bottle Neck -->
  <path d="
    M98 58
    C98 50 104 46 112 46

    H148

    C156 46 162 50 162 58

    V72

    H98

    Z" fill="#efefef" stroke="#b9b9b9" stroke-width="1.4" />

  <!-- Lid -->

  <rect x="86" y="20" width="88" height="34" rx="8" fill="url(#lid)" stroke="#7f7f7f" stroke-width="1.6" />

  <!-- Lid Highlight -->

  <rect x="90" y="23" width="10" height="28" rx="5" fill="#fff" opacity=".22" />

  <!-- Screw Threads -->

  <g stroke="#8d8d8d" stroke-width="1">

    <line x1="92" y1="28" x2="168" y2="28" />

    <line x1="92" y1="33" x2="168" y2="33" />

    <line x1="92" y1="38" x2="168" y2="38" />

    <line x1="92" y1="43" x2="168" y2="43" />

    <line x1="92" y1="48" x2="168" y2="48" />

  </g>

  <!-- Neck Shadow -->

  <rect x="103" y="55" width="54" height="4" fill="#8c8c8c" opacity=".18" />
